<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmark Manager</title>
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
</head>
<body>
    <header>
        <!-- Google search form -->
        <form action="https://www.google.com/search" method="GET">
            <input type="text" id="searchInputGoogle" name="q" placeholder="Search on Google...">
            <button type="submit" id="searchButtonGoogle">
                <img src="https://www.google.com/s2/favicons?domain=google.com&sz=64" alt="Google logo">
            </button>
        </form>
    </header>
    
    <main>
        <!-- The container for your bookmarks will be filled by JavaScript -->
        <section id="bookmarksSection" class="encarts-container">
            <div id="bookmarksContainer"></div>
        </section>
    </main>

    <footer>
    </footer>
    <script src="lib/masonry.pkgd.min.js"></script>
    <!-- Including your JavaScript script that will manage the display of bookmarks -->
    <script src="js/newtab.js"></script>
</body>
</html>
